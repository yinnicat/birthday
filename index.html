<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Faith 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       CUSTOMIZE HERE
    ============================================= */
    :root {
      --card-color-1: #9b0000;      /* crimson dark */
      --card-color-2: #c0392b;      /* crimson mid */
      --card-color-3: #e74c3c;      /* crimson bright */
      --accent-bar:   #ff6b6b;      /* top bar accent */
      --signature:    #c0392b;      /* signature color */
      --confetti-colors: #c0392b, #e74c3c, #ff6b6b, #ff9999, #ffcccc, #d4a5a5, #8b0000;
    }

    /* =============================================
       BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a0a;
      font-family: 'DM Sans', sans-serif;
    }

    /* =============================================
       SCENE
    ============================================= */
    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem 4rem;
      min-height: 540px;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    #confetti-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 999;
    }

    /* =============================================
       CARD (front – closed state)
    ============================================= */
    .card-wrapper {
      perspective: 1000px;
      width: 360px;
      cursor: pointer;
    }

    .card {
      width: 360px;
      height: 230px;
      position: relative;
      transform-style: preserve-3d;
    }

    .card.opening {
      animation: openCard 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes openCard {
      0%   { transform: rotateY(0deg) translateY(0); }
      30%  { transform: rotateY(-15deg) translateY(-10px); }
      60%  { transform: rotateY(-45deg) translateY(-20px); }
      100% { transform: rotateY(-90deg) translateY(-5px); }
    }

    .card-front {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(145deg, var(--card-color-1) 0%, var(--card-color-2) 50%, var(--card-color-3) 100%);
      box-shadow: 0 20px 60px rgba(180, 0, 0, 0.45), 0 4px 20px rgba(0,0,0,0.3);
      border: 1.5px solid rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .card-front::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .card-front::after {
      content: '';
      position: absolute;
      bottom: -50px; left: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }

    .front-icon  { font-size: 36px; z-index: 1; line-height: 1; margin-bottom: 10px; }

    .front-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 30px;
      color: #fff;
      text-shadow: 0 2px 14px rgba(0,0,0,0.4);
      letter-spacing: -0.5px;
      text-align: center;
      z-index: 1;
    }

    .front-sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin-top: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 1;
    }

    .tap-hint {
      position: absolute;
      bottom: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
      animation: pulse 2s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* =============================================
       INNER CARD (revealed message)
    ============================================= */
    .inner-card {
      width: 360px;
      background: #fff;
      border-radius: 18px;
      padding: 2.25rem 2.5rem 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 4px 20px rgba(0,0,0,0.1);
      border: 0.5px solid rgba(0,0,0,0.06);
      display: none;
      opacity: 0;
      transform: translateY(20px) scale(0.96);
      transition: opacity 0.6s ease, transform 0.6s ease;
      position: relative;
      overflow: hidden;
    }

    .inner-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--card-color-1), var(--accent-bar), var(--card-color-3));
    }

    .inner-card.visible { display: block; }
    .inner-card.shown   { opacity: 1; transform: translateY(0) scale(1); }

    .inner-deco {
      font-size: 38px;
      text-align: center;
      margin-bottom: 1rem;
      line-height: 1;
    }

    /* ---- CUSTOMIZE: recipient name ---- */
    .inner-name {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--card-color-2);
      text-align: center;
      margin-bottom: 4px;
    }

    .inner-greeting {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 1rem;
      text-align: center;
    }

    /* ---- CUSTOMIZE: message body ---- */
    .inner-message {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #444;
      line-height: 1.8;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* ---- CUSTOMIZE: signature ---- */
    .inner-signature {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--signature);
      text-align: right;
      border-top: 0.5px solid #f0e0e0;
      padding-top: 1rem;
    }

    .redo-btn {
      margin-top: 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #bbb;
      background: none;
      border: 0.5px solid #e0e0e0;
      border-radius: 20px;
      padding: 6px 18px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: color 0.2s, border-color 0.2s;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .redo-btn:hover { color: var(--card-color-2); border-color: var(--card-color-2); }
  </style>
</head>
<body>

<div class="scene" id="scene">
  <div id="confetti-container"></div>

  <!-- =============================================
       FRONT OF CARD — customize icon & text below
  ============================================= -->
  <div class="card-wrapper" id="cardWrapper" onclick="openTheCard()">
    <div class="card" id="card">
      <div class="card-front">
        <div class="front-icon">🎂</div>
        <div class="front-text">Happy Birthday, Faith!</div>
        <div class="front-sub">A message awaits you</div>
        <div class="tap-hint">↓ tap to open</div>
      </div>
    </div>
  </div>

  <!-- =============================================
       INSIDE OF CARD — customize everything here
  ============================================= -->
  <div class="inner-card" id="innerCard">
    <div class="inner-deco">🌹 🎈 🌹</div>
    <div class="inner-name">for Faith</div>
    <div class="inner-greeting">Happy Birthday!! ❤️</div>
    <div class="inner-message">
      Congrats on not being a teenager no more!<br>
      Happy Birthday!!<br>
      Hope your day is as amazing as you are. 🥂
    </div>
    <div class="inner-signature">with love ♡</div>
    <button class="redo-btn" onclick="resetCard()">↺ close &amp; reopen</button>
  </div>
</div>

<script>
  let opened = false;

  /* ---- confetti color palette (edit to match theme) ---- */
  const confettiColors = [
    '#8b0000','#c0392b','#e74c3c',
    '#ff6b6b','#ff9999','#ffcccc','#d4a5a5'
  ];

  function spawnConfetti() {
    const container = document.getElementById('confetti-container');
    for (let i = 0; i < 70; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        const size = 5 + Math.random() * 8;
        const duration = 1.5 + Math.random() * 2;
        const startX = Math.random() * 100;
        const drift = (Math.random() - 0.5) * 120;
        el.style.cssText = `
          position: absolute;
          left: ${startX}%;
          top: -12px;
          width: ${size}px;
          height: ${size}px;
          background: ${confettiColors[Math.floor(Math.random() * confettiColors.length)]};
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
          animation: fall-${i} ${duration}s ease-in forwards;
        `;
        const style = document.createElement('style');
        style.textContent = `
          @keyframes fall-${i} {
            0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(${drift}px) rotate(${360 + Math.random()*360}deg); opacity: 0; }
          }
        `;
        document.head.appendChild(style);
        container.appendChild(el);
        setTimeout(() => { el.remove(); style.remove(); }, (duration + 0.5) * 1000);
      }, i * 25);
    }
  }

  function openTheCard() {
    if (opened) return;
    opened = true;

    const card    = document.getElementById('card');
    const wrapper = document.getElementById('cardWrapper');
    const inner   = document.getElementById('innerCard');

    card.classList.add('opening');

    setTimeout(() => {
      wrapper.style.display = 'none';
      inner.classList.add('visible');
      spawnConfetti();
      requestAnimationFrame(() => requestAnimationFrame(() => inner.classList.add('shown')));
    }, 1000);
  }

  function resetCard() {
    opened = false;
    const wrapper = document.getElementById('cardWrapper');
    const card    = document.getElementById('card');
    const inner   = document.getElementById('innerCard');

    inner.classList.remove('shown');
    setTimeout(() => {
      inner.classList.remove('visible');
      card.classList.remove('opening');
      wrapper.style.display = 'block';
    }, 400);
  }
</script>
</body>
</html>
